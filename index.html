<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Kanak 💖</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:radial-gradient(circle at top,#2b5876,#0f2027);
color:#fff;
font-family:'Segoe UI','Georgia','serif';
}

/* ❤️ FLOATING HEARTS — SABKE UPAR */
.heart{
position:absolute;
bottom:-60px;
font-size:70px;
opacity:.75;
animation:floatUp linear infinite;
filter:drop-shadow(0 0 10px rgba(255,255,255,.4));
z-index:9999;              /* 🔥 ON TOP */
pointer-events:none;       /* clicks pass through */
}
@keyframes floatUp{
to{transform:translateY(-130vh);opacity:0}
}

/* 📦 STORY PAGES */
.page{
display:none;
width:90%;
max-width:360px;
padding:26px;
border-radius:26px;
background:rgba(255,255,255,0.12);
backdrop-filter:blur(14px);
box-shadow:0 40px 120px rgba(0,0,0,.7);
text-align:center;
animation:fadeIn .9s ease;
position:relative;
z-index:10;                /* content layer */
}
.page.active{display:block}

@keyframes fadeIn{
from{opacity:0;transform:translateY(40px)}
to{opacity:1}
}

button{
margin-top:20px;
padding:12px 30px;
border:none;
border-radius:30px;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
color:#fff;
font-size:15px;
cursor:pointer;
}

/* 📜 LETTER */
.letter{
background:linear-gradient(#f7e7c6,#ecd19a);
color:#4b2e1f;
padding:22px;
border-radius:18px;
border:2px solid #c9a24d;
box-shadow: inset 0 0 30px rgba(0,0,0,.25),
            0 15px 40px rgba(0,0,0,.5);
line-height:2;
font-size:16px;
letter-spacing:.4px;
}

/* 🎂 CAKE */
.cake{
margin:20px auto;
width:140px;height:95px;
background:#ff8fab;
border-radius:16px;
position:relative;
}
.cake::before{
content:"";
position:absolute;
top:-26px;left:50%;
transform:translateX(-50%);
width:10px;height:26px;
background:#fff;border-radius:4px;
}
.flame{
position:absolute;
top:-42px;left:50%;
transform:translateX(-50%);
width:16px;height:16px;
background:orange;
border-radius:50%;
box-shadow:0 0 20px orange;
animation:flicker .25s infinite alternate;
}
@keyframes flicker{
to{transform:translateX(-50%) scale(1.3)}
}
.hidden{display:none}

/* 📸 PHOTOS */
.photo{
width:190px;height:190px;
margin:20px auto;
border-radius:50%;
overflow:hidden;
border:4px solid rgba(255,255,255,.9);
box-shadow:0 0 35px rgba(255,255,255,.6);
background:#000;
}
.photo img{
width:100%;
height:100%;
object-fit:cover;
transition:opacity 1s;
}

/* 🎁 GIFT */
.gift{
font-size:56px;
margin:20px auto;
cursor:pointer;
}
.giftOut div{
font-size:42px;
margin-top:10px;
opacity:0;
animation:pop .8s forwards;
}
.giftOut .rose{animation-delay:.8s}
